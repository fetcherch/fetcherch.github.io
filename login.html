<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ImportantDM - Login</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="logo">
        ImportantDM
    </div>

    <div class="card">

        <h2>Log In</h2>

        <form onsubmit="return validateLogin(event)">

            <label>Username</label>
            <input
                type="text"
                id="loginUsername"
                maxlength="100"
                pattern="^[a-zA-Z0-9_.-]{1,100}$"
                oninput="filterUsername(this)"
                required
            >

            <br><br>

            <label>Password</label>
            <input
                type="password"
                id="loginPassword"
                maxlength="100"
                oninput="filterPassword(this)"
                required
            >

            <br><br>

            <button type="submit">
                Log In
            </button>

        </form>

    </div>

    <div class="center">
        <a href="signup.html" class="link">
            Create Account
        </a>
    </div>

</div>

<script>

/* 🔒 USERNAME: allow only letters, numbers, _ - . */
function filterUsername(el) {
    el.value = el.value.replace(/[^a-zA-Z0-9_.-]/g, "");
}

/* 🔒 PASSWORD: NO SPACES */
function filterPassword(el) {
    el.value = el.value.replace(/\s/g, "");
}

/* LOGIN VALIDATION */
function validateLogin(event) {
    event.preventDefault();

    const username =
        document.getElementById("loginUsername").value.trim();

    const password =
        document.getElementById("loginPassword").value;

    const usernamePattern =
        /^[a-zA-Z0-9_.-]{1,100}$/;

    if (!usernamePattern.test(username)) {
        alert("Invalid username");
        return false;
    }

    if (password.length > 100) {
        alert("Password too long");
        return false;
    }

    alert("Login successful");

    window.location.href = "index.html";

    return false;
}

</script>

</body>
</html>

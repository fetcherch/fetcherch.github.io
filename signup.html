<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ImportantDM - Sign Up</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="logo">
        ImportantDM
    </div>

    <div class="card">

        <h2>Create Account</h2>

        <p class="small-text">
            Username: letters, numbers, _ - and .
        </p>

        <br>

        <form onsubmit="return validateSignup(event)">

            <label>Username</label>
            <input
                type="text"
                id="signupUsername"
                maxlength="100"
                pattern="^[a-zA-Z0-9_.-]{1,100}$"
                oninput="filterUsername(this)"
                required
            >

            <br><br>

            <label>Password</label>
            <input
                type="password"
                id="signupPassword"
                maxlength="100"
                oninput="filterPassword(this)"
                required
            >

            <br><br>

            <label>Inbox Email</label>
            <input
                type="email"
                id="inboxMail"
                oninput="filterEmail(this)"
                required
            >

            <br><br>

            <label>Price per Message ($)</label>
            <input
                type="text"
                id="pricePerMessage"
                inputmode="numeric"
                maxlength="6"
                oninput="validatePriceInput(this)"
                required
            >

            <br><br>

            <button type="submit">
                Create Account
            </button>

        </form>

    </div>

    <div class="center">
        <a href="login.html" class="link">
            Already have an account?
        </a>
    </div>

</div>
<script>
/* AUTO LOGOUT ON INDEX PAGE LOAD */
window.addEventListener("DOMContentLoaded", () => {
    localStorage.removeItem("loggedUser");

    // optional: also clear Supabase session if you're using auth elsewhere
    if (typeof supabaseClient !== "undefined" && supabaseClient.auth) {
        supabaseClient.auth.signOut().catch(() => {});
    }
});
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = "https://pneaxwundeuadwlbaxwh.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBuZWF4d3VuZGV1YWR3bGJheHdoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5MTUxMjYsImV4cCI6MjA5NjQ5MTEyNn0.7iSF3B-8AgubRowVOBB9sOwCJKCDVwDr6Yl4LPh8v2E";

const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);
</script>

<script>

/* USERNAME FILTER */
function filterUsername(el) {
    el.value = el.value.replace(/[^a-zA-Z0-9_.-]/g, "");
}

/* 🔒 PASSWORD: NO SPACES */
function filterPassword(el) {
    el.value = el.value.replace(/\s/g, "");
}

/* 🔒 EMAIL: NO SPACES */
function filterEmail(el) {
    el.value = el.value.replace(/\s/g, "");
}

/* PRICE FILTER */
function validatePriceInput(el) {
    el.value = el.value.replace(/\D/g, "");
    el.value = el.value.replace(/^0+/, "");

    if (el.value.length > 6) {
        el.value = el.value.slice(0, 6);
    }
}

/* FINAL VALIDATION */
async function validateSignup(event) {

    event.preventDefault();

    const username =
        document.getElementById("signupUsername").value.trim();

    const password =
        document.getElementById("signupPassword").value;

    const email =
        document.getElementById("inboxMail").value.trim();

    let price =
        document.getElementById("pricePerMessage").value;

    price = price.replace(/\D/g, "");
    price = price.replace(/^0+/, "");
    price = Number(price);

    const usernamePattern =
        /^[a-zA-Z0-9_.-]{1,100}$/;

    if (!usernamePattern.test(username)) {
        alert("Invalid username");
        return false;
    }

    if (password.length > 100) {
        alert("Password too long");
        return false;
    }

    if (!email.includes("@")) {
        alert("Invalid email");
        return false;
    }

    if (!price || price < 1 || price > 999999) {
        alert("Invalid price");
        return false;
    }

const { data, error } = await supabaseClient
  .from("profiles")
  .insert([
    {
      username: username,
      email: email,
      password: password,
      price_per_message: price
    }
  ]);

if (error) {
  alert(error.message);
  return false;
}

alert("Account created!");
localStorage.setItem("loggedUser", username);
window.location.href = "edit.html";
return false;
}

</script>

</body>
</html>

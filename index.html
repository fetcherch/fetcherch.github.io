<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ImportantDM - Login</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="logo">
        ImportantDM
    </div>
    <div class="slogan">
        Receive paid messages directly to your Email inbox. Cut through the noise, focus on what matters.
    </div>

    <div class="card">

        <h2>Log In</h2>

        <form onsubmit="return validateLogin(event)">

            <label>Username</label>
            <input
                type="text"
                id="loginUsername"
                maxlength="100"
                pattern="^[a-zA-Z0-9_.-]{1,100}$"
                oninput="filterUsername(this)"
                required
            >

            <br><br>

            <label>Password</label>
            <input
                type="password"
                id="loginPassword"
                maxlength="100"
                oninput="filterPassword(this)"
                required
            >

            <br><br>

            <button type="submit">
                Log In
            </button>

        </form>

    </div>

    <div class="center">
        <a href="signup.html" class="link">
            Create Account
        </a>
    </div>

</div>
<script>
/* AUTO LOGOUT ON INDEX PAGE LOAD */
window.addEventListener("DOMContentLoaded", () => {
    localStorage.removeItem("loggedUser");

    // optional: also clear Supabase session if you're using auth elsewhere
    if (typeof supabaseClient !== "undefined" && supabaseClient.auth) {
        supabaseClient.auth.signOut().catch(() => {});
    }
});
</script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = "https://pneaxwundeuadwlbaxwh.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBuZWF4d3VuZGV1YWR3bGJheHdoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5MTUxMjYsImV4cCI6MjA5NjQ5MTEyNn0.7iSF3B-8AgubRowVOBB9sOwCJKCDVwDr6Yl4LPh8v2E";

const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);
</script>

<script>

/* 🔒 USERNAME: allow only letters, numbers, _ - . */
function filterUsername(el) {
    el.value = el.value.replace(/[^a-zA-Z0-9_.-]/g, "");
}

/* 🔒 PASSWORD: NO SPACES */
function filterPassword(el) {
    el.value = el.value.replace(/\s/g, "");
}

/* LOGIN VALIDATION */
async function validateLogin(event) {
    event.preventDefault();

    const username =
        document.getElementById("loginUsername").value.trim();

    const password =
        document.getElementById("loginPassword").value;

    const usernamePattern =
        /^[a-zA-Z0-9_.-]{1,100}$/;

    if (!usernamePattern.test(username)) {
        alert("Invalid username");
        return false;
    }

    if (password.length > 100) {
        alert("Password too long");
        return false;
    }

    const { data, error } = await supabaseClient
        .from("profiles")
        .select("*")
        .eq("username", username)
        .eq("password", password);

    if (error || !data || data.length === 0) {
        alert("Invalid username or password");
        return false;
    }

    alert("Login successful");

    localStorage.setItem("loggedUser", data[0].username);

    window.location.href = "edit.html";

    return false;
}

</script>

</body>
</html>

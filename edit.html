const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

<script>

const username = localStorage.getItem("loggedUser");

let earnings = 0;
let userData = null;

/* LOAD USER FROM SUPABASE */
async function loadUser() {

    if (!username) {
        window.location.href = "index.html";
        return;
    }

    const { data, error } = await supabaseClient
        .from("profiles")
        .select("*")
        .eq("username", username)
        .single();

    if (error || !data) {
        alert("User not found");
        window.location.href = "index.html";
        return;
    }

    userData = data;

    /* document.getElementById("pricePerMessage").value =
        data.price_per_message; */

    document.getElementById("inboxMail").value =
        data.email;

    document.getElementById("profileUrl").innerText =
        `https://dona.re/${username}`;

    earnings = Number(data.earnings || 0);

    document.getElementById("earnings").innerText =
        "CHF " + earnings;

    await loadPayouts();
}

loadUser();

/* UI HELPERS */
function validatePriceInput(el) {

    el.value = el.value.replace(/\D/g, "");
    el.value = el.value.replace(/^0+/, "");

    if (el.value.length > 6) {
        el.value = el.value.slice(0, 6);
    }
}

function copyUrl() {

    navigator.clipboard.writeText(
        document.getElementById("profileUrl").innerText
    );

    alert("Copied");
}

function logout() {

    localStorage.removeItem("loggedUser");

    window.location.href = "index.html";
}

/* SAVE SETTINGS */
async function saveSettings() {

    /*let price =
        document.getElementById("pricePerMessage").value;*/

    const mail =
        document.getElementById("inboxMail").value.trim();

    /*price = price.replace(/\D/g, "");
    price = price.replace(/^0+/, "");
    price = Number(price);*/

    /*if (!price || price < 1 || price > 999999) {
        alert("Invalid price");
        return;
    }*/

    if (!mail.includes("@")) {
        alert("Invalid email");
        return;
    }

    const { error } = await supabaseClient
        .from("profiles")
        .update({
            /*price_per_message: price,*/
            email: mail
        })
        .eq("username", username);

    if (error) {
        alert(error.message);
        return;
    }

    alert("Settings saved to database");
}

/* PAYOUT SYSTEM */
async function requestPayout() {

    const name =
        document.getElementById("accountName").value.trim();

    const iban =
        document.getElementById("iban").value.trim();

    const bank =
        document.getElementById("bankName").value.trim();

    const country =
        document.getElementById("country").value.trim();

    const reference =
        document.getElementById("reference").value.trim();

    if (!name || !iban || !bank || !country) {
        alert("Please fill all required fields");
        return;
    }

    // 🔒 ALWAYS VERIFY EARNINGS FROM DATABASE
    const { data: freshProfile, error: earningsError } =
        await supabaseClient
            .from("profiles")
            .select("earnings")
            .eq("username", username)
            .single();

    if (earningsError || !freshProfile) {
        alert("Failed to verify earnings");
        return;
    }

    const dbEarnings =
        Number(freshProfile.earnings || 0);

    if (dbEarnings < 100) {
        alert("Minimum payout is $100");
        return;
    }

    // 🔥 amount comes from database
    const previousEarnings = dbEarnings;

    // 🔥 instant UI update
    earnings = 0;

    document.getElementById("earnings").innerText =
        "CHF 0";

    alert("Payout requested");

    // 🔥 background DB sync
    try {

        const { error: payoutError } =
            await supabaseClient
                .from("payouts")
                .insert([
                    {
                        username: username,
                        amount: previousEarnings,
                        iban: iban,
                        name: name,
                        bank: bank,
                        country: country,
                        reference: reference,
                        status: "pending"
                    }
                ]);

        if (payoutError) {

            console.log(
                "Payout error:",
                payoutError
            );

            return;
        }

        const { error: updateError } =
            await supabaseClient
                .from("profiles")
                .update({
                    earnings: 0
                })
                .eq("username", username);

        if (updateError) {

            console.log(
                "Earnings update error:",
                updateError
            );

            return;
        }

        await loadPayouts();

    } catch (err) {

        console.log(err);

        alert("Something went wrong");
    }
}

/* LOAD PAYOUT HISTORY */
async function loadPayouts() {

    const { data, error } = await supabaseClient
        .from("payouts")
        .select("*")
        .eq("username", username)
        .order("created_at", {
            ascending: false
        });

    if (error) {
        console.log(error);
        return;
    }

    const list =
        document.getElementById("payoutList");

    list.innerHTML = "";

    if (!data || data.length === 0) {

        list.innerHTML =
            "<p>No payouts yet</p>";

        return;
    }

    data.forEach(p => {

        const div =
            document.createElement("div");

        div.className = "payout-item";

        div.innerText =
            `${p.iban} | ${p.name} | $${p.amount} | ${p.status}`;

        list.appendChild(div);
    });
}

</script>

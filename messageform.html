<script>
const params = new URLSearchParams(window.location.search);
const username = params.get("user");

function validatePriceInput(el) {
    el.value = el.value.replace(/\D/g, "");
    el.value = el.value.replace(/^0+/, "");

    if (el.value.length > 6) {
        el.value = el.value.slice(0, 6);
    }
}

// UI init
document.getElementById("usernameDisplay").innerText =
    username ? "dona.re/" + username : "No user";

async function loadUser() {
    // No pricing load anymore
    if (!username) return;

    /*document.getElementById("priceDisplay").innerText =
        "Set your own price below";*/
}

loadUser();

async function payAndSend() {

    const senderName = document.getElementById("senderName").value;
    const contactInfo = document.getElementById("contactInfo").value;
    const messageText = document.getElementById("messageText").value;

    const priceInput = document.getElementById("messagePrice").value;
    const price = parseInt(priceInput, 10);

    if (!senderName || !contactInfo || !messageText) {
        alert("Please fill all fields");
        return;
    }

    if (!price || price < 1 || price > 999999) {
        alert("Invalid price");
        return;
    }

    const res = await fetch(
        "https://pneaxwundeuadwlbaxwh.supabase.co/functions/v1/create-checkout",
        {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                amount: price,
                username,
                sender_name: senderName,
                contact_info: contactInfo,
                message_text: messageText
            })
        }
    );

    const data = await res.json();

    if (data.url) {
        window.location.href = data.url;
    } else {
        alert("Checkout failed");
        console.log(data);
    }
}
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ImportantDM - Message</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="logo" id="usernameDisplay">Username</div>

    <div class="card center">
        <h3>Message Price</h3>
        <div class="big-number" id="priceDisplay">$0</div>
        <p class="small-text">per message</p>
    </div>

    <div class="card">
        <h2>Send a Message</h2>

        <label>Your Name</label>
        <input id="senderName">

        <br><br>

        <label>Contact Info</label>
        <input id="contactInfo">

        <br><br>

        <label>Message</label>
        <textarea id="messageText"></textarea>

        <br><br>

        <button onclick="payAndSend()">Pay & Send</button>
    </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>

const supabaseUrl = "https://pneaxwundeuadwlbaxwh.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBuZWF4d3VuZGV1YWR3bGJheHdoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5MTUxMjYsImV4cCI6MjA5NjQ5MTEyNn0.7iSF3B-8AgubRowVOBB9sOwCJKCDVwDr6Yl4LPh8v2E";

const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);
</script>
<script>

// =======================
// LINKTREE STYLE ROUTING
// =======================
let path = window.location.pathname;

// remove "/" and ignore empty routes
let username = path.replace("/", "").trim();

// block static files
const blocked = ["", "index.html", "style.css", "messageform.html"];
if (blocked.includes(username)) username = null;

let price = 0;

// UI init
document.getElementById("usernameDisplay").innerText =
    username ? "@" + username : "No user";

async function loadUser() {

    if (!username) return;

    const { data, error } = await supabaseClient
        .from("profiles")
        .select("price_per_message")
        .eq("username", username)
        .single();

    if (data) {
        price = data.price_per_message || 5;
        document.getElementById("priceDisplay").innerText = "$" + price;
    } else {
        document.getElementById("priceDisplay").innerText = "User not found";
    }
}

loadUser();

async function payAndSend() {

    const senderName = document.getElementById("senderName").value;
    const contactInfo = document.getElementById("contactInfo").value;
    const messageText = document.getElementById("messageText").value;

    if (!senderName || !contactInfo || !messageText) {
        alert("Please fill all fields");
        return;
    }

    const res = await fetch(
        "https://pneaxwundeuadwlbaxwh.supabase.co/functions/v1/create-checkout",
        {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                amount: price,
                username,
                sender_name: senderName,
                contact_info: contactInfo,
                message_text: messageText
            })
        }
    );

    const data = await res.json();

    if (data.url) {
        window.location.href = data.url;
    } else {
        alert("Checkout failed");
        console.log(data);
    }
}

</script>

</body>
</html>
